name: Build & Release CatLock

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      app_signing_artifact_id: ${{ steps.upload-app-signing-zip.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Compile source and tests
        shell: pwsh
        run: |
          Get-ChildItem -Path src,tests -Recurse -File -Include *.py | ForEach-Object {
            python -m py_compile $_.FullName
          }

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests

      - name: Check tag and VERSION match
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          FILE_VERSION=$(python -c "import sys; sys.path.append('src'); from version import VERSION; print(VERSION)")
          echo "Tag: $TAG_NAME"
          echo "VERSION in code: $FILE_VERSION"
          if [ "$TAG_NAME" != "$FILE_VERSION" ]; then
            echo "Error: tag name ($TAG_NAME) does not match VERSION ($FILE_VERSION)"
            exit 1
          fi

      - name: Build CatLock onedir with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onedir `
            --contents-directory "_internal" `
            --add-data "resources/img/icon.ico;resources/img/" `
            --add-data "resources/img/icon.png;resources/img/" `
            --add-data "resources/config/config.json;resources/config/" `
            --icon "resources/img/icon.ico" `
            --hidden-import plyer.platforms.win.notification `
            --noconsole `
            --name "CatLock" `
            "src/main.py"

      - name: Smoke test frozen app
        shell: pwsh
        run: .\scripts\ci\Invoke-CatLockSmokeTest.ps1 -ExePath ".\dist\CatLock\CatLock.exe" -Label "Frozen app"

      - name: Package unsigned onedir artifact
        shell: pwsh
        run: Compress-Archive -Path "dist\CatLock" -DestinationPath "catlock-onedir-unsigned.zip" -Force

      - name: Package app exe for signing
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "signing-input" -Force | Out-Null
          Copy-Item "dist\CatLock\CatLock.exe" "signing-input\CatLock.exe" -Force
          Compress-Archive -Path "signing-input\CatLock.exe" -DestinationPath "catlock-app-unsigned.zip" -Force

      - name: Upload unsigned onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: catlock-onedir-unsigned
          path: catlock-onedir-unsigned.zip

      - name: Upload unsigned app exe signing package
        id: upload-app-signing-zip
        uses: actions/upload-artifact@v4
        with:
          name: catlock-app-unsigned-zip
          path: catlock-app-unsigned.zip

  sign-app:
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Sign app exe with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORG_ID }}"
          project-slug: "cat-lock"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ needs.build-windows.outputs.app_signing_artifact_id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-app-zip"

      - name: Extract signed app exe
        run: |
          unzip -o signed-app-zip/catlock-app-unsigned.zip -d signed-app
          test -f signed-app/CatLock.exe

      - name: Upload signed app exe
        uses: actions/upload-artifact@v4
        with:
          name: catlock-app-signed
          path: signed-app/CatLock.exe

  build-installer:
    needs: sign-app
    runs-on: windows-latest
    outputs:
      installer_signing_artifact_id: ${{ steps.upload-installer-signing-zip.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download unsigned onedir artifact
        uses: actions/download-artifact@v4
        with:
          name: catlock-onedir-unsigned
          path: unsigned

      - name: Download signed app exe
        uses: actions/download-artifact@v4
        with:
          name: catlock-app-signed
          path: signed-app

      - name: Stage signed onedir bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Expand-Archive -Path "unsigned\catlock-onedir-unsigned.zip" -DestinationPath "dist" -Force
          Copy-Item "signed-app\CatLock.exe" "dist\CatLock\CatLock.exe" -Force

      - name: Smoke test signed onedir app
        shell: pwsh
        run: .\scripts\ci\Invoke-CatLockSmokeTest.ps1 -ExePath ".\dist\CatLock\CatLock.exe" -Label "Signed onedir app"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress

      - name: Get numeric version for Inno
        id: get_version
        shell: bash
        run: |
          FILE_VERSION=$(python -c "import sys; sys.path.append('src'); from version import VERSION; print(VERSION.lstrip('v'))")
          echo "file_version=$FILE_VERSION" >> $GITHUB_OUTPUT

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.file_version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DCatLockVersion=$version" `
            "installer\CatLock.iss"

      - name: Smoke test installer upgrade layout
        shell: pwsh
        run: .\scripts\ci\Test-CatLockInstallerLayout.ps1

      - name: Package portable onedir zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release" -Force | Out-Null
          Compress-Archive -Path "dist\CatLock" -DestinationPath "release\CatLockPortable.zip" -Force

      - name: Package installer for signing
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer-signing-input" -Force | Out-Null
          Copy-Item "build\CatLockSetup.exe" "installer-signing-input\CatLockSetup.exe" -Force
          Compress-Archive -Path "installer-signing-input\CatLockSetup.exe" -DestinationPath "catlock-installer-unsigned.zip" -Force

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: catlock-portable
          path: release/CatLockPortable.zip

      - name: Upload unsigned installer signing package
        id: upload-installer-signing-zip
        uses: actions/upload-artifact@v4
        with:
          name: catlock-installer-unsigned-zip
          path: catlock-installer-unsigned.zip

  sign-installer:
    needs: build-installer
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Sign installer with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORG_ID }}"
          project-slug: "cat-lock"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ needs.build-installer.outputs.installer_signing_artifact_id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-installer-zip"

      - name: Extract signed installer
        run: |
          unzip -o signed-installer-zip/catlock-installer-unsigned.zip -d signed-installer
          test -f signed-installer/CatLockSetup.exe

      - name: Upload signed installer
        uses: actions/upload-artifact@v4
        with:
          name: catlock-installer-signed
          path: signed-installer/CatLockSetup.exe

  create-release:
    needs: sign-installer
    runs-on: ubuntu-latest

    steps:
      - name: Download signed installer
        uses: actions/download-artifact@v4
        with:
          name: catlock-installer-signed
          path: release

      - name: Download portable zip
        uses: actions/download-artifact@v4
        with:
          name: catlock-portable
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/CatLockSetup.exe
            release/CatLockPortable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
